<!DOCTYPE html>
<html lang="zh-CN">
<head>
{% include '_head.html' %}
</head>
<body>

{% include '_navbar.html' %}

<header class="hero">
    <div class="container">
        <div class="hero-content">
            <span class="hero-badge">📝 所有文章</span>
            <h1>文章归档</h1>
            <p>共 {{ posts|length }} 篇，按时间降序排列。</p>
        </div>
    </div>
</header>

<main class="container">
    <section class="section">
        <div class="posts-grid">
            {% for post in posts %}
            <article class="post-card">
                <h3><a href="{{ url_for('post_detail', post_id=post.id) }}">{{ post.title }}</a></h3>
                <p>{{ post.summary }}</p>
                <div class="card-footer">
                    <time datetime="{{ post.date.strftime('%Y-%m-%d') }}">{{ post.date.strftime("%Y/%m/%d") }}</time>
                    <span class="read-time">{{ post.read_time }}</span>
                </div>
            </article>
            {% endfor %}
        </div>
    </section>
</main>

{% include '_footer.html' %}

<div class="fab-group">
    <button class="fab-btn" id="backTop" aria-label="返回顶部">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
        <span class="tooltip">返回顶部</span>
    </button>
    <button class="fab-btn" id="backHome" aria-label="返回主页">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="tooltip">返回主页</span>
    </button>
    <button class="fab-btn" id="themeToggle" aria-label="切换主题">
        <svg id="sunIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="moonIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <span class="tooltip">切换主题</span>
    </button>
</div>

</body>
</html>
